# Editing this workflow: claude-code-action only runs when this file matches the
# repository's default branch. It validates during the GitHub App token exchange
# (a security guard, not standard GitHub Actions behavior), so a pull request
# that changes this file skips its own review and the change takes effect only
# after it merges. Expected: https://github.com/anthropics/claude-code-action/issues/443

name: Claude PR Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened]

jobs:
  claude-auto-review:
    # Skip release PRs: they contain only mechanical version bumps and changelog
    # updates that don't require code review. Excluded patterns:
    #   - PRs from release/* branches (e.g., release/v0.7.0)
    #   - PRs titled "chore: release v*" (release-please convention)
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'opened' &&
      !startsWith(github.event.pull_request.title, 'chore: release v') &&
      !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}

      - name: Run Claude Auto Review
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: true
          prompt: |
            Please provide a comprehensive code review of this pull request. Focus on:
            - Code quality and best practices
            - Security considerations
            - Performance implications
            - Documentation and testing completeness

            Provide specific, actionable feedback with line-by-line suggestions where appropriate.
          use_vertex: "true"
          claude_args: |
            --model claude-sonnet-5
        env:
          CLOUD_ML_REGION: global

  claude-manual-trigger:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}

      - name: Run Claude Manual Action
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: true
          trigger_phrase: "@claude"
          use_vertex: "true"
          claude_args: |
            --model claude-sonnet-5
        env:
          CLOUD_ML_REGION: global

# Claude Code Github Action
# https://docs.anthropic.com/en/docs/claude-code/github-actions
# https://github.com/marketplace/actions/claude-code-action-official
# https://github.com/anthropics/claude-code-action
#
# GitHub checkout action
# https://github.com/actions/checkout
#
# GitHub Google Authenticate action
# https://github.com/google-github-actions/auth
#
# Google Cloud Workload Identity Federation
# https://cloud.google.com/iam/docs/workload-identity-federation-with-deployment-pipelines
# https://github.com/google-github-actions/auth?tab=readme-ov-file#preferred-direct-workload-identity-federation
#
# Configure Repository Variables
# https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/use-variables
# Set the GitHub Actions > Repository variables GOOGLE_CLOUD_PROJECT to the Google Cloud project ID
# Set the GitHub Actions > Repository variables WORKLOAD_IDENTITY_PROVIDER to the workload ID federation principal identifier
