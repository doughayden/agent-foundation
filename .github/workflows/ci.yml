name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  pull-requests: read
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Typical run: <1 min (path filtering). 5 min is generous buffer
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            # Tracks the PyPA src-layout convention: source under src/, tests under tests/
            # https://packaging.python.org/en/latest/discussions/src-layout-vs-flat-layout/
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'

  code-quality:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    name: Code Quality and Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Typical run: 2-3 min (format, lint, type check, tests). 10 min prevents hanging
    strategy:
      matrix:
        python-version: ['3.13']
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --locked

      - name: Run Ruff formatting check
        run: uv run ruff format --check
        if: success() || failure()

      - name: Run Ruff linting
        run: uv run ruff check --output-format=github
        if: success() || failure()

      - name: Run MyPy type checking
        run: uv run mypy
        if: success() || failure()

      - name: Run pytest with coverage
        run: uv run pytest --cov
        if: success() || failure()

  # Integration lane: real Postgres via service container, no LLM, no GCP creds.
  # Runs without --cov (the 100% gate is unit-lane-only and would fail on fail_under).
  integration:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    name: Integration Tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Typical run: 2-3 min (deps + Postgres lane, incl. image pull). 10 min prevents hanging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --locked

      # testcontainers starts a throwaway postgres:18 via the runner's Docker daemon
      # (ubuntu-latest ships Docker); no service container. No --cov (unit-lane-only).
      - name: Run integration tests
        run: uv run pytest tests/integration

  # Deterministic agent eval gate: runs the agent on Vertex AI (dev WIF
  # principal) but scores with judge-free metrics, so it is cheap and stable.
  # pytest is the gate because AgentEvaluator.evaluate() raises on a
  # sub-threshold metric; the `adk eval` CLI exits 0 on failure and cannot gate.
  agent-eval:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    name: Agent Eval (deterministic)
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Typical run: 2-3 min (sync + two live inference runs): 10 min prevents hanging
    environment: dev
    permissions:
      contents: read
      id-token: write  # WIF auth for Vertex AI inference
    env:
      GOOGLE_GENAI_USE_VERTEXAI: "TRUE"
      GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ vars.GOOGLE_CLOUD_LOCATION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --locked

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}

      - name: Run deterministic agent evals
        run: uv run pytest tests/eval -m "deterministic"

  # Always-runs sentinel for branch protection.
  status:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Typical run: <1 min (status check). 5 min is generous buffer
    needs: [changes, code-quality, integration, agent-eval]
    if: always()
    steps:
      - name: Check required status
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "❌ Changes detection failed (result: ${{ needs.changes.result }})"
            exit 1
          elif [[ "${{ needs.changes.outputs.code }}" == "true" ]]; then
            if [[ "${{ needs.code-quality.result }}" != "success" ]]; then
              echo "❌ Code quality and tests failed"
              exit 1
            elif [[ "${{ needs.integration.result }}" != "success" ]]; then
              echo "❌ Integration tests failed"
              exit 1
            elif [[ "${{ needs.agent-eval.result }}" != "success" ]]; then
              echo "❌ Agent eval gate failed"
              exit 1
            else
              echo "✅ Code quality, tests, integration, and agent evals passed"
            fi
          else
            echo "⏭️ Code quality, tests, integration, and agent evals skipped - no relevant files changed"
          fi
